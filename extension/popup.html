<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 260px;
            padding: 16px;
            font-family: Arial, sans-serif;
            background: #1e1e2e;
            color: white;
            margin: 0;
        }

        h2 {
            margin: 0 0 4px;
            font-size: 16px;
        }

        p {
            margin: 0 0 16px;
            font-size: 12px;
            color: #aaa;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        #status {
            font-size: 12px;
            color: #aaa;
            margin-top: 12px;
            text-align: center;
        }
    </style>
</head>

<body>
    <h2>🎯 DSA Shadow</h2>
    <p>Track your real LeetCode progress</p>
    <button onclick="openDashboard()">Open Dashboard</button>
    <div id="status">Checking login...</div>
    <script src="popup.js"></script>
</body>

</html>
